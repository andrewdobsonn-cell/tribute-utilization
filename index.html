<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tribute Caregiver Utilization Report</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #F0F4F8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 48px 40px;
      width: 100%;
      max-width: 560px;
    }
    .logo {
      background: #0F2647;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 14px 20px;
      border-radius: 8px;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    .logo span {
      color: #93C5FD;
      font-weight: normal;
      font-size: 14px;
      display: block;
      margin-top: 2px;
    }
    h2 {
      color: #0F2647;
      font-size: 18px;
      margin-bottom: 24px;
    }
    .upload-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #44546A;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .file-input-wrapper {
      position: relative;
      border: 2px dashed #CBD5E1;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #F8FAFC;
    }
    .file-input-wrapper:hover {
      border-color: #2C4A7C;
      background: #EFF6FF;
    }
    .file-input-wrapper.has-file {
      border-color: #16A34A;
      background: #F0FDF4;
    }
    .file-input-wrapper input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .file-label {
      font-size: 13px;
      color: #64748B;
    }
    .file-label.selected {
      color: #16A34A;
      font-weight: bold;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0F2647;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
      letter-spacing: 0.3px;
    }
    .btn:hover { background: #2C4A7C; }
    .btn:disabled {
      background: #94A3B8;
      cursor: not-allowed;
    }
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.info {
      background: #DBEAFE;
      color: #1E40AF;
      display: block;
    }
    .status.success {
      background: #D1FAE5;
      color: #065F46;
      display: block;
    }
    .status.error {
      background: #FEE2E2;
      color: #991B1B;
      display: block;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #93C5FD;
      border-top-color: #1E40AF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider {
      border: none;
      border-top: 1px solid #E2E8F0;
      margin: 28px 0;
    }
    .note {
      font-size: 12px;
      color: #94A3B8;
      margin-top: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      Tribute Home Care
      <span>Caregiver Utilization Report Generator</span>
    </div>

    <h2>Upload Weekly Data Files</h2>

    <div class="upload-group">
      <label>Caregiver Data CSV</label>
      <div class="file-input-wrapper" id="cgWrapper">
        <input type="file" id="cgFile" accept=".csv">
        <div class="file-label" id="cgLabel">Click to upload or drag & drop</div>
      </div>
    </div>

    <div class="upload-group">
      <label>Schedule Data CSV</label>
      <div class="file-input-wrapper" id="scWrapper">
        <input type="file" id="scFile" accept=".csv">
        <div class="file-label" id="scLabel">Click to upload or drag & drop</div>
      </div>
    </div>

    <hr class="divider">

    <button class="btn" id="generateBtn" disabled onclick="generate()">
      Generate Report
    </button>

    <div class="status" id="status"></div>
    <p class="note">Processing typically takes 5–15 seconds depending on data size.</p>
  </div>

  <script>
    const cgFile = document.getElementById('cgFile');
    const scFile = document.getElementById('scFile');
    const cgLabel = document.getElementById('cgLabel');
    const scLabel = document.getElementById('scLabel');
    const cgWrapper = document.getElementById('cgWrapper');
    const scWrapper = document.getElementById('scWrapper');
    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('status');

    function updateLabel(input, label, wrapper) {
      if (input.files[0]) {
        label.textContent = '✓ ' + input.files[0].name;
        label.className = 'file-label selected';
        wrapper.className = 'file-input-wrapper has-file';
      }
      checkReady();
    }

    cgFile.addEventListener('change', () => updateLabel(cgFile, cgLabel, cgWrapper));
    scFile.addEventListener('change', () => updateLabel(scFile, scLabel, scWrapper));

    function checkReady() {
      btn.disabled = !(cgFile.files[0] && scFile.files[0]);
    }

    function setStatus(msg, type) {
      status.className = 'status ' + type;
      status.innerHTML = msg;
    }

    async function generate() {
      btn.disabled = true;
      setStatus('<span class="spinner"></span> Processing your data — please wait...', 'info');

      const formData = new FormData();
      formData.append('caregiver', cgFile.files[0]);
      formData.append('schedule', scFile.files[0]);

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const err = await response.text();
          setStatus('❌ Error: ' + err, 'error');
          btn.disabled = false;
          return;
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const today = new Date().toISOString().slice(0,10);
        a.href = url;
        a.download = `CaregiverUtilization_${today}.xlsx`;
        a.click();
        URL.revokeObjectURL(url);

        setStatus('✅ Report generated successfully! Your download should start automatically.', 'success');
      } catch (err) {
        setStatus('❌ Unexpected error: ' + err.message, 'error');
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
